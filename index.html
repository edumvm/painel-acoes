<!DOCTYPE html>
<!-- =====================================================================
     TEMPLATE FIXO — Painel de Ações | Eduardo
     Este arquivo define o layout e nunca é modificado pelo script
     automático. Apenas data.json é atualizado pelo GitHub Actions.
     Para alterar o layout, edite este arquivo manualmente e faça upload.
     ===================================================================== -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Ações | Eduardo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid #1e293b; }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: #f8fafc; letter-spacing: -0.02em; }
    .timestamp { font-size: 0.8rem; color: #64748b; background: #1e293b; padding: 6px 12px; border-radius: 6px; }

    /* Cards */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .card { background: #1e293b; border-radius: 12px; padding: 16px; border: 1px solid #334155; position: relative; transition: border-color .2s; }
    .card:hover { border-color: #475569; }
    .card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .ticker { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; display: flex; align-items: center; gap: 6px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .company { font-size: 0.7rem; color: #64748b; text-align: right; max-width: 90px; line-height: 1.3; }
    .currency-badge { font-size: 0.65rem; background: #0f172a; border: 1px solid #334155; color: #94a3b8; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .price { font-size: 1.6rem; font-weight: 800; color: #f8fafc; margin-bottom: 2px; }
    .price-date { font-size: 0.7rem; color: #64748b; margin-bottom: 12px; }
    .metrics { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    .metrics td { padding: 3px 0; font-size: 0.78rem; }
    .metrics td:first-child { color: #94a3b8; }
    .metrics td:last-child { text-align: right; color: #e2e8f0; font-weight: 500; }
    .perf-row { display: flex; gap: 8px; justify-content: space-between; }
    .perf-row span { font-size: 0.75rem; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
    .pos { background: rgba(34,197,94,.15); color: #4ade80; }
    .neg { background: rgba(239,68,68,.15); color: #f87171; }
    .neu { background: #1e293b; color: #64748b; }

    /* Seções */
    .section { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
    .section h2 { font-size: 0.95rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
    .chart-wrap { max-height: 280px; }

    /* Fatos Relevantes */
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .tab { background: #0f172a; border: 1px solid #334155; color: #94a3b8; font-size: 0.8rem; font-weight: 600; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
    .tab:hover { border-color: #475569; color: #e2e8f0; }
    .tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .tab.active .dot { background: #fff; }
    .fr-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .fr-list li { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; background: #0f172a; border-radius: 8px; border: 1px solid #1e293b; }
    .fr-date { font-size: 0.72rem; color: #64748b; white-space: nowrap; min-width: 72px; padding-top: 2px; }
    .fr-badge { font-size: 0.65rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .fr-badge.fr { background: rgba(59,130,246,.2); color: #60a5fa; }
    .fr-badge.co { background: rgba(168,85,247,.2); color: #c084fc; }
    .fr-link { color: #93c5fd; text-decoration: none; font-size: 0.82rem; line-height: 1.4; display: flex; align-items: flex-start; gap: 4px; }
    .fr-link:hover { color: #bfdbfe; text-decoration: underline; }
    .fr-pdf-icon { font-size: 0.75rem; color: #f87171; flex-shrink: 0; padding-top: 1px; }
    .fr-ir { color: #94a3b8; font-size: 0.85rem; padding: 8px 0; }
    .fr-ir a { color: #60a5fa; text-decoration: none; }
    .fr-ir a:hover { text-decoration: underline; }
    .fr-empty { color: #475569; font-size: 0.82rem; padding: 8px 0; font-style: italic; }

    /* Notícias */
    .news-item { padding: 12px 14px; background: #0f172a; border-radius: 8px; border: 1px solid #1e293b; margin-bottom: 8px; }
    .news-item:last-child { margin-bottom: 0; }
    .news-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; flex-wrap: wrap; }
    .news-ticker { font-size: 0.72rem; font-weight: 700; background: #1e293b; padding: 2px 8px; border-radius: 4px; color: #94a3b8; }
    .news-date { font-size: 0.72rem; color: #64748b; }
    .news-source { font-size: 0.72rem; color: #475569; }
    .news-item a { color: #93c5fd; text-decoration: none; font-size: 0.85rem; line-height: 1.4; }
    .news-item a:hover { color: #bfdbfe; text-decoration: underline; }
    .news-empty { color: #475569; font-size: 0.82rem; padding: 12px 0; text-align: center; font-style: italic; }
    .news-empty code { background: #0f172a; padding: 1px 6px; border-radius: 4px; font-size: 0.78rem; color: #64748b; }

    /* Footer */
    footer { text-align: center; color: #334155; font-size: 0.72rem; padding: 20px 0 8px; border-top: 1px solid #1e293b; margin-top: 8px; }

    /* Loading */
    .loading { text-align: center; padding: 60px 20px; color: #475569; }
    .loading p { font-size: 0.9rem; margin-top: 12px; }
    .error-msg { color: #f87171; font-size: 0.85rem; text-align: center; padding: 20px; }

    @media (max-width: 600px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
      .header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="header">
    <h1>📊 Painel de Ações</h1>
    <span class="timestamp" id="timestamp">Carregando...</span>
  </header>

  <!-- Cards de cotações -->
  <div id="cardsGrid" class="cards-grid">
    <div class="loading"><p>Buscando dados...</p></div>
  </div>

  <!-- Gráfico YTD -->
  <div class="section" id="chartSection" style="display:none">
    <h2>Performance YTD 2026 (%)</h2>
    <div class="chart-wrap"><canvas id="perfChart"></canvas></div>
  </div>

  <!-- Fatos Relevantes & Comunicados -->
  <div class="section" id="frSection" style="display:none">
    <h2>Fatos Relevantes &amp; Comunicados</h2>
    <div class="tabs" id="frTabs"></div>
    <div id="frContent"></div>
  </div>

  <!-- Notícias / Clipping -->
  <div class="section" id="newsSection">
    <h2>Notícias</h2>
    <div id="newsList">
      <p class="news-empty">Nenhuma notícia adicionada.</p>
    </div>
  </div>

  <footer>
    Painel pessoal &mdash; dados: Fundamentus, CVM/ENET &mdash; Não constitui recomendação de investimento
  </footer>
</div>

<script>
// ─── globals ───────────────────────────────────────────────────────────────
let _data = null;
let _chart = null;

// ─── helpers ───────────────────────────────────────────────────────────────
function pClass(v) {
  if (v === null || v === undefined) return 'neu';
  return Number(v) >= 0 ? 'pos' : 'neg';
}
function fmtPerf(v) {
  if (v === null || v === undefined) return 'N/D';
  const n = Number(v);
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function prefixSymbol(currency) {
  return currency === 'USD' ? 'US$' : 'R$';
}
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── cards ─────────────────────────────────────────────────────────────────
function renderCards(stocks) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = stocks.map(s => {
    const sym = prefixSymbol(s.currency);
    const hasNew = s.hasNew ? '<span class="dot"></span>' : '';
    return '<div class="card">' +
      '<div class="card-head">' +
        '<span class="ticker">' + esc(s.ticker) + hasNew + '</span>' +
        '<div style="text-align:right">' +
          '<div class="company">' + esc(s.company) + '</div>' +
          '<div class="currency-badge" style="margin-top:4px">' + esc(s.currency) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="price">' + sym + esc(s.price) + '</div>' +
      '<div class="price-date">' + esc(s.priceDate) + '</div>' +
      '<table class="metrics">' +
        '<tr><td>P/L</td><td>' + esc(s.pl) + '</td></tr>' +
        '<tr><td>P/VP</td><td>' + esc(s.pvp) + '</td></tr>' +
        '<tr><td>DY</td><td>' + esc(s.dy) + '</td></tr>' +
        '<tr><td>ROE</td><td>' + esc(s.roe) + '</td></tr>' +
      '</table>' +
      '<div class="perf-row">' +
        '<span class="' + pClass(s.p12m) + '">12m: ' + fmtPerf(s.p12m) + '</span>' +
        '<span class="' + pClass(s.pYtd) + '">YTD: ' + fmtPerf(s.pYtd) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ─── chart ─────────────────────────────────────────────────────────────────
function renderChart(stocks) {
  const chartData = stocks
    .filter(s => s.pYtd !== null && s.pYtd !== undefined)
    .sort((a, b) => b.pYtd - a.pYtd);
  if (chartData.length === 0) return;

  document.getElementById('chartSection').style.display = '';

  if (_chart) _chart.destroy();
  const ctx = document.getElementById('perfChart').getContext('2d');
  _chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: chartData.map(s => s.ticker),
      datasets: [{
        label: 'YTD %',
        data: chartData.map(s => s.pYtd),
        backgroundColor: chartData.map(s => s.pYtd >= 0 ? 'rgba(34,197,94,.7)' : 'rgba(239,68,68,.7)'),
        borderColor:     chartData.map(s => s.pYtd >= 0 ? '#22c55e' : '#ef4444'),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + (ctx.raw >= 0 ? '+' : '') + ctx.raw.toFixed(2) + '%'
          }
        }
      },
      scales: {
        x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', callback: v => (v >= 0 ? '+' : '') + v + '%' } },
        y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', font: { weight: '600' } } }
      }
    }
  });
}

// ─── fatos relevantes ──────────────────────────────────────────────────────
function renderFRContent(ticker) {
  const content = document.getElementById('frContent');
  if (!_data || !_data.fatos) return;
  const f = _data.fatos[ticker];
  if (!f) {
    content.innerHTML = '<p class="fr-empty">Sem dados para ' + esc(ticker) + '.</p>';
    return;
  }

  if (f.type === 'ir') {
    content.innerHTML = '<p class="fr-ir">Fatos disponíveis no site de RI: ' +
      '<a href="' + esc(f.irUrl) + '" target="_blank" rel="noopener">' + esc(f.irLabel) + '</a></p>';
    return;
  }

  const items = f.items || [];
  if (items.length === 0) {
    content.innerHTML = '<p class="fr-empty">Nenhum fato relevante ou comunicado nos últimos 10 dias.</p>';
    return;
  }

  content.innerHTML = '<ul class="fr-list">' +
    items.map(item =>
      '<li>' +
        '<span class="fr-date">' + esc(item.date) + '</span>' +
        '<span class="fr-badge ' + item.badge.toLowerCase() + '">' + esc(item.badge) + '</span>' +
        '<a class="fr-link" href="' + esc(item.url) + '" target="_blank" rel="noopener" title="Abrir documento">' +
          '<span class="fr-pdf-icon">📄</span>' +
          '<span>' + esc(item.label) + '</span>' +
        '</a>' +
      '</li>'
    ).join('') +
  '</ul>';
}

window.switchTab = function(ticker) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.ticker === ticker);
  });
  renderFRContent(ticker);
};

function renderFatos(stocks) {
  if (!stocks || stocks.length === 0) return;
  const section = document.getElementById('frSection');
  section.style.display = '';
  const firstTicker = stocks[0].ticker;

  document.getElementById('frTabs').innerHTML = stocks.map(s => {
    const active = s.ticker === firstTicker ? ' active' : '';
    const newDot = s.hasNew ? '<span class="dot"></span>' : '';
    return '<button class="tab' + active + '" data-ticker="' + esc(s.ticker) + '" ' +
      'onclick="switchTab(\'' + esc(s.ticker) + '\')">' + esc(s.ticker) + newDot + '</button>';
  }).join('');

  renderFRContent(firstTicker);
}

// ─── notícias ──────────────────────────────────────────────────────────────
function renderNoticias(clipping) {
  const list = document.getElementById('news
