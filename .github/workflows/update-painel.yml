name: Atualizar Painel de Ações

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 08:00 Brasília (UTC-3), seg-sex
    - cron: '0 21 * * 1-5'   # 18:00 Brasília (UTC-3), seg-sex
  workflow_dispatch:            # permite rodar manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 pytz

      - name: Rodar update_data.py
        run: python scripts/update_data.py

      - name: Commit e push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: atualiza data.json $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
